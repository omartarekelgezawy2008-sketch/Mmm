<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تواصل الكابتن - الداتابيز الجديدة</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 8px; color: #333; direction: rtl; }
        .container { max-width: 100%; background: white; padding: 10px; border-radius: 8px; box-sizing: border-box; }
        h1, h3 { text-align: center; color: #2c3e50; font-size: 18px; margin: 8px 0; }
        .card { background: #fff; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; }
        textarea, input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .msg-btn { display: block; width: 100%; text-align: right; background: #f8f9fa; border: 1px solid #ccc; padding: 12px; margin: 6px 0; border-radius: 6px; font-size: 14px; font-weight: bold; color: #2c3e50; }
        .msg-btn:active { background: #e8f8f5; border-color: #25D366; }
        .client-box { padding: 12px; margin: 5px 0; background: #f1f5f9; border-right: 4px solid #3498db; border-radius: 4px; font-weight: bold; font-size: 15px; }
        .client-box.active { background: #e0f2fe; border-right-color: #0284c7; }
        .send-btn { width: 100%; background: #25D366; color: white; padding: 14px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>لوحة تواصل الكابتن 🏃‍♂️</h1>

    <div class="card">
        <h3>👤 1. اختر المشترك:</h3>
        <div id="coachClients" style="max-height: 140px; overflow-y: auto;"></div>
    </div>

    <div class="card">
        <h3>📱 2. اضغط لتجميع الرسالة والفيديوهات:</h3>
        <div id="coachMessages" style="max-height: 250px; overflow-y: auto;"></div>
    </div>

    <div class="card" style="background: #f0fdf4; border: 1px dashed #25D366;">
        <h3>📝 3. المراجعة والإرسال للواتساب:</h3>
        <p>المشترك الحالي: <span id="selectedClientName" style="color:blue; font-weight:bold;">لم يتم الاختيار</span></p>
        
        <div style="display:flex; gap:5px; margin-bottom:5px;">
            <input type="text" id="setsCount" placeholder="المجاميع">
            <input type="text" id="repsCount" placeholder="العدات">
        </div>
        <button onclick="generateCustomWorkout()" style="background: #2980b9; color:white; border:none; padding:8px; width:100%; border-radius:4px; font-size:13px; margin-bottom:5px;">إضافة صيغة التوجيهات</button>

        <textarea id="finalMessage" rows="8" placeholder="الرسالة النهائية تظهر هنا..."></textarea>
        <button class="send-btn" onclick="sendToWhatsApp()">إرسال لواتساب المشترك 💬</button>
    </div>
</div>

<script>
    let database;
    let currentPhone = "";
    let currentName = "";

    // تم ربط الداتابيز الجديدة هنا بنجاح
    firebase.initializeApp({ databaseURL: "https://eeyru-878e7-default-rtdb.firebaseio.com/" });
    database = firebase.database();

    database.ref('clients').on('value', (snapshot) => {
        let html = '';
        snapshot.forEach((child) => {
            html += `<div class="client-box" id="c_${child.val().phone}" onclick="selectClient('${child.val().name}', '${child.val().phone}')">👤 ${child.val().name}</div>`;
        });
        document.getElementById('coachClients').innerHTML = html || 'لا يوجد مشتركين';
    });

    database.ref('messages').on('value', (snapshot) => {
        let html = '';
        snapshot.forEach((child) => {
            const data = child.val();
            html += `<button class="msg-btn" onclick="handleButtonClick('${data.category}', '${data.title}', '${data.content}')">🏷️ [${data.category}] ${data.title}</button>`;
        });
        document.getElementById('coachMessages').innerHTML = html || 'لا يوجد خانات مضافة';
    });

    function selectClient(name, phone) {
        currentName = name; currentPhone = phone;
        document.getElementById('selectedClientName').innerText = name;
        document.querySelectorAll('.client-box').forEach(el => el.classList.remove('active'));
        document.getElementById('c_' + phone).classList.add('active');
    }

    function handleButtonClick(category, title, content) {
        let textToAppend = "";
        if (category === "جروب الأكل") {
            textToAppend = `🍏 *نظام الأكل [ ${title} ] :*\n${content}`;
        } else if (category === "جروب تمارين الجيم") {
            textToAppend = `💪 *تمارين الجيم [ ${title} ] :*\n${content}`;
        } else if (category === "جروب تمارين البيت") {
            textToAppend = `🏠 *تمارين البيت [ ${title} ] :*\n${content}`;
        } else if (category === "جروب ميديا وتوضيح") {
            textToAppend = `🎬 *شرح فيديو لتمرين ( ${title} ) :*\n🎥 شاهد الفيديو من الرابط: ${content}`;
        }
        appendToMessage(textToAppend);
    }

    function generateCustomWorkout() {
        const sets = document.getElementById('setsCount').value.trim() || "3 مجاميع";
        const reps = document.getElementById('repsCount').value.trim() || "15 عدة";
        appendToMessage(`⚙️ *توجيهات التمرين:*\nالمجاميع ${sets} في ${reps}.\n🔹 وركز في الأداء الحركي.`);
    }

    function appendToMessage(text) {
        const area = document.getElementById('finalMessage');
        area.value = area.value === "" ? text : area.value + "\n\n-----------\n\n" + text;
    }

    function sendToWhatsApp() {
        let msg = document.getElementById('finalMessage').value;
        if(!currentPhone || !msg) { alert("اختر المشترك وجهز الرسالة أولاً!"); return; }
        window.open(`https://api.whatsapp.com/send?phone=${currentPhone}&text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>
</body>
</html>
