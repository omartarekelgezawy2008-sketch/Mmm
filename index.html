<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <!-- إعدادات الشاشة لضمان عدم تغير الحجم (تثبيت العرض) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>عقارات المتميزة بالجيزة | أ. عمرو محمد</title>
    <!-- استدعاء مكتبة الفايربيس -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --midnight: #020617; /* لون غامق جداً وفخم */
            --deep-navy: #0f172a; /* لون الكارد */
            --gold: #c5a059; /* ذهبي هادئ */
            --white: #f8fafc;
            --text-light: #e2e8f0;
        }

        body {
            background-color: var(--midnight);
            color: var(--text-light);
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background: linear-gradient(180deg, #0f172a, #020617);
            text-align: center;
            padding: 50px 20px;
            border-bottom: 2px solid var(--gold);
        }

        header h1 {
            color: var(--gold);
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        /* كارت العقار الغامق */
        .card {
            background: var(--deep-navy);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #1e293b;
            transition: 0.3s;
        }

        .card:hover { border-color: var(--gold); }

        .slider-container { width: 100%; height: 250px; position: relative; }
        .slider-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .slider-img.active { display: block; }
        .slider-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; z-index: 5; }
        .slider-btn.prev { right: 10px; }
        .slider-btn.next { left: 10px; }

        .card-body { padding: 20px; }
        .title { color: var(--gold); font-size: 1.4rem; font-weight: 700; margin-bottom: 10px; }
        .price { color: #f8fafc; font-weight: 600; font-size: 1.2rem; margin-bottom: 15px; }
        
        .btn { display: block; width: 100%; padding: 14px; margin-top: 10px; border-radius: 10px; text-decoration: none; font-weight: 700; text-align: center; transition: 0.3s; }
        .wa-btn { background: #25D366; color: white; }
        .call-btn { background: var(--gold); color: #020617; }
        .btn:hover { opacity: 0.9; transform: scale(1.02); }
    </style>
</head>
<body>

    <header>
        <h1>عقارات المتميزة بالجيزة</h1>
        <p>مع الأستاذ/ عمرو محمد</p>
    </header>

    <div class="container">
        <main class="grid" id="propertiesGrid">
            <p style="text-align:center;">جاري تحميل العقارات...</p>
        </main>
    </div>

    <script>
        const grid = document.getElementById('propertiesGrid');
        const myPhoneNumber = "01006801079";
        const firebaseConfig = { databaseURL: "https://cort-6368a-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        database.ref('properties').on('value', (snapshot) => {
            grid.innerHTML = '';
            if(!snapshot.exists()) { grid.innerHTML = '<p>لا توجد عقارات حالياً.</p>'; return; }

            snapshot.forEach((child) => {
                const p = child.val();
                // صياغة الرسالة المطلوبة
                const msg = encodeURIComponent(`السلام عليكم، تواصل مع الأستاذ عمرو محمد.\nأنا مهتم بمعاينة عقار: ${p.title}\nالسعر: ${p.price}`);
                
                let imgs = p.images.map((img, i) => `<img src="${img}" class="slider-img ${i==0?'active':''}">`).join('');
                let btns = p.images.length > 1 ? `<button class="slider-btn prev" onclick="changeSlide(this, -1)">❯</button><button class="slider-btn next" onclick="changeSlide(this, 1)">❮</button>` : '';

                grid.innerHTML += `
                    <div class="card">
                        <div class="slider-container">${imgs}${btns}</div>
                        <div class="card-body">
                            <div class="title">${p.title}</div>
                            <div class="price">${p.price} ج.م</div>
                            <p>${p.description}</p>
                            <a href="https://wa.me/2${myPhoneNumber}?text=${msg}" class="btn wa-btn">💬 تواصل مع الأستاذ عمرو محمد (واتس)</a>
                            <a href="tel:${myPhoneNumber}" class="btn call-btn">📞 اتصال مباشر مع الأستاذ عمرو محمد</a>
                        </div>
                    </div>
                `;
            });
        });

        function changeSlide(btn, dir) {
            const slides = btn.parentElement.querySelectorAll('.slider-img');
            let idx = Array.from(slides).findIndex(s => s.classList.contains('active'));
            slides[idx].classList.remove('active');
            let next = (idx + dir + slides.length) % slides.length;
            slides[next].classList.add('active');
        }
    </script>
</body>
</html>
