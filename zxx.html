<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الأدمن المتطورة - رفع الوسائط الفوري</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f3; margin: 0; padding: 10px; color: #333; direction: rtl; }
        .container { max-width: 100%; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); box-sizing: border-box; margin: 10px auto; max-width: 600px; border-top: 5px solid #007bff; }
        h1, h3 { text-align: center; color: #333; font-size: 20px; margin: 10px 0; }
        .card { background: #fff; padding: 15px; border: 1px solid #dee2e6; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        button { width: 100%; background: #007bff; color: white; padding: 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #0056b3; }
        .list-item { background: #f8f9fa; padding: 10px; margin: 5px 0; border-right: 4px solid #007bff; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; border: 1px solid #dee2e6; border-right-width: 4px; }
        .delete-btn { background: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-size: 12px; width: auto; cursor: pointer; }
        .delete-btn:hover { background: #bd2130; }
        .login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#343a40; display:flex; justify-content:center; align-items:center; z-index:9999; padding: 15px; box-sizing: border-box; }
        .login-box { background:white; padding:25px; border-radius:12px; width:100%; max-width:340px; text-align:center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .upload-msg { color: #28a745; font-weight: bold; display: none; text-align: center; margin-top: 5px; font-size: 14px; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="login-overlay" id="loginScreen">
    <div class="login-box">
        <h2>لوحة الأدمن 👑</h2>
        <p style="font-size: 13px; color: #666;">ادخل كلمة السر للتحكم في موقع الكابتن</p>
        <input type="password" id="adminPasswordInput" placeholder="كلمة السر">
        <button onclick="checkAdminLogin()" style="background:#343a40; margin-top:10px;">دخول الغرفة 🔐</button>
    </div>
</div>

<div class="container" id="mainContent" style="display: none;">
    <h1>لوحة تحكم الأدمن والوسائط 👑</h1>
    
    <div class="card">
        <h3>👥 إضافة مشترك جديد</h3>
        <input type="text" id="clientName" placeholder="اسم المشترك">
        <input type="text" id="clientPhone" placeholder="رقم الهاتف">
        <button onclick="addClient()" style="background-color: #28a745;">حفظ المشترك بالفوركس 💾</button>
        <div id="clientsList" style="margin-top:10px; max-height:150px; overflow-y:auto;"></div>
    </div>

    <div class="card">
        <h3>🎬 إضافة الوجبات أو الوسائط والفيديوهات</h3>
        <select id="msgCategory" onchange="toggleInputType()">
            <option value="جروب الأكل">جروب الأكل 🍏 (جدول نصي)</option>
            <option value="جروب تمارين الجيم">جروب تمارين الجيم 💪 (جدول نصي)</option>
            <option value="جروب تمارين البيت">جروب تمارين البيت 🏠 (جدول نصي)</option>
            <option value="جروب ميديا وتوضيح">جروب ميديا وتوضيح 🎬 (فيديو/ملف مباشر من الاستوديو)</option>
        </select>
        
        <input type="text" id="btnTitle" placeholder="اسم الزرار (مثال: تجميع بنش بالدمبل)">
        <textarea id="msgContent" rows="5" placeholder="اكتب تفاصيل الجدول هنا..."></textarea>
        
        <div id="mediaUploadBox" style="display: none; border: 2px dashed #007bff; padding: 20px; text-align: center; margin: 10px 0; border-radius: 8px; background: #f8f9fa;">
            <label style="font-weight: bold; display: block; margin-bottom: 8px; color: #007bff;">اختر الفيديو أو الملف من الموبايل مباشرة:</label>
            <input type="file" id="mediaFile" accept="video/*,image/*" style="padding:5px;">
            <div id="uploadStatusText" class="upload-msg">⏳ جاري معالجة وتشفير الفيديو وحفظه بالداتابيز...</div>
        </div>

        <button onclick="addMessage()">حفظ ونشر بموقع الكابتن فوراً 🚀</button>
        <div id="messagesList" style="margin-top:10px; max-height:200px; overflow-y:auto;"></div>
    </div>
</div>

<script>
    // نظام تسجيل الدخول المحمي
    function checkAdminLogin() {
        if(document.getElementById('adminPasswordInput').value === "000") {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            initFirebase();
        } else { alert("كلمة السر خاطئة!"); }
    }

    let database;
    function initFirebase() {
        // تم ربط الداتابيز الجديدة المحددة من قبلك بنجاح هنا
        firebase.initializeApp({ databaseURL: "https://eeyru-878e7-default-rtdb.firebaseio.com/" });
        database = firebase.database();

        // مزامنة قائمة المشتركين
        database.ref('clients').on('value', (snapshot) => {
            let html = '';
            snapshot.forEach((child) => {
                html += `<div class="list-item"><span>👤 ${child.val().name}</span><button class="delete-btn" onclick="deleteClient('${child.key}')">حذف</button></div>`;
            });
            document.getElementById('clientsList').innerHTML = html || 'لا يوجد مشتركين حالياً';
        });

        // مزامنة قائمة الأزرار والخانات المرفوعة
        database.ref('messages').on('value', (snapshot) => {
            let html = '';
            snapshot.forEach((child) => {
                html += `<div class="list-item"><span><strong>[${child.val().category}]</strong> ${child.val().title}</span><button class="delete-btn" onclick="deleteMessage('${child.key}')">حذف</button></div>`;
            });
            document.getElementById('messagesList').innerHTML = html || 'لا يوجد خانات مضافة';
        });
    }

    // التحويل التلقائي بين كتابة النص أو اختيار ملف فيديو من الاستوديو
    function toggleInputType() {
        const cat = document.getElementById('msgCategory').value;
        if(cat === "جروب ميديا وتوضيح") {
            document.getElementById('mediaUploadBox').style.display = "block";
            document.getElementById('msgContent').style.display = "none";
        } else {
            document.getElementById('mediaUploadBox').style.display = "none";
            document.getElementById('msgContent').style.display = "block";
        }
    }

    // الطريقة المبتكرة والآمنة: تحويل الفيديو إلى Base64 ليرفع مباشرة بدون قيود سيرفرات
    function addMessage() {
        const category = document.getElementById('msgCategory').value;
        const title = document.getElementById('btnTitle').value.trim();
        
        if(!title) { alert("برجاء كتابة اسم الزرار أولاً!"); return; }

        if(category === "جروب ميديا وتوضيح") {
            const fileInput = document.getElementById('mediaFile');
            const file = fileInput.files[0];
            if(!file) { alert("برجاء اختيار الفيديو أو الملف من استوديو الموبايل!"); return; }
            
            // تنبيه الحجم لحماية سرعة الداتابيز
            if (file.size > 12 * 1024 * 1024) { 
                return alert("الفيديو كبير جداً! الحد الأقصى للفيديوهات هو 12 ميجا لضمان سرعة التحميل.");
            }

            document.getElementById('uploadStatusText').style.display = "block";

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64MediaData = e.target.result; // الفيديو متشفر بالكامل وجاهز للـ Firebase
                
                database.ref('messages').push({
                    category: category,
                    title: title,
                    content: base64MediaData // حفظ البيانات بالداتابيز مباشرة
                }).then(() => {
                    resetForm();
                    alert("تم تشفير وحفظ الفيديو بنجاح وظهر كـ زرار أوتوماتيكي عند الكابتن! 🎉");
                }).catch(() => {
                    alert("حدث خطأ أثناء الحفظ بقاعدة البيانات.");
                    document.getElementById('uploadStatusText').style.display = "none";
                });
            };
            reader.readAsDataURL(file);
        } else {
            const content = document.getElementById('msgContent').value.trim();
            if(!content) { alert("اكتب تفاصيل الجدول أولاً!"); return; }
            
            database.ref('messages').push({ category: category, title: title, content: content });
            resetForm();
            alert("تم حفظ الجدول بنجاح ونشر بموقع الكابتن!");
        }
    }

    function resetForm() {
        document.getElementById('btnTitle').value = '';
        document.getElementById('msgContent').value = '';
        document.getElementById('mediaFile').value = '';
        document.getElementById('uploadStatusText').style.display = "none";
    }

    function addClient() {
        const name = document.getElementById('clientName').value.trim();
        let phone = document.getElementById('clientPhone').value.trim();
        if(name && phone) {
            if(phone.startsWith('0')) phone = '2' + phone;
            database.ref('clients').push({ name: name, phone: phone });
            document.getElementById('clientName').value = ''; document.getElementById('clientPhone').value = '';
            alert("تم حفظ المشترك الجديد!");
        }
    }
    
    function deleteClient(id) { if(confirm("هل تريد حذف هذا المشترك؟")) database.ref('clients/' + id).remove(); }
    function deleteMessage(id) { if(confirm("هل تريد حذف هذه الخانة؟")) database.ref('messages/' + id).remove(); }
</script>
</body>
</html>
