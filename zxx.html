<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة الآمنة 🦅</title>
    <!-- استدعاء مكتبة الفايربيس ومكتبة التشفير MD5 لحماية باسورك -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --midnight: #020617; --deep-navy: #0f172a; --gold: #c5a059; --text-light: #e2e8f0; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--midnight); color: var(--text-light); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: var(--deep-navy); padding: 30px; border-radius: 16px; border: 1px solid #1e293b; }
        h1, h3 { text-align: center; color: var(--gold); }
        .grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 30px; margin-top: 30px; }
        @media(max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        .card { background: #1e293b; padding: 25px; border-radius: 12px; border: 1px solid #334155; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--gold); }
        input[type="text"], textarea, input[type="file"] { width: 100%; padding: 12px; border: 1px solid #475569; background: #0f172a; color: white; border-radius: 8px; box-sizing: border-box; font-family: 'Cairo'; }
        .estate-box { padding: 15px; margin: 10px 0; background: #0f172a; border-right: 5px solid var(--gold); border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-family: 'Cairo'; }
        .send-btn { width: 100%; background: var(--gold); color: var(--midnight); padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; font-family: 'Cairo'; transition: 0.3s; }
        .send-btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .status-msg { text-align: center; font-weight: bold; color: #22c55e; margin-top: 10px; display: none;}
        .login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--midnight); display:flex; justify-content:center; align-items:center; z-index:9999; }
        .login-box { background: var(--deep-navy); padding: 40px; border-radius: 16px; width: 340px; text-align: center; border: 1px solid var(--gold); }
        .login-box input { width: 100%; padding: 12px; margin-top: 15px; border: 1px solid #475569; background: #0f172a; color: white; border-radius: 6px; text-align: center; font-size: 16px; }
        .login-box button { background: var(--gold); color: var(--midnight); border: none; padding: 12px; width: 100%; margin-top: 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-family: 'Cairo'; font-size: 16px; }
    </style>
</head>
<body>

<div class="login-overlay" id="loginScreen">
    <div class="login-box">
        <h2 style="margin:0; color:var(--gold)">لوحة تحكم الأستاذ عمرو 🦅</h2>
        <p style="color:#94a3b8; font-size:14px; margin-top:5px;">أدخل كلمة السر لإضافة وتحديث الشقق</p>
        <input type="password" id="adminPasswordInput" placeholder="كلمة السر الخاصة بك">
        <button onclick="checkAdminLogin()">دخول آمن</button>
    </div>
</div>

<div class="container" id="mainContent" style="display: none;">
    <h1>لوحة إدارة العقارات المتميزة بالجيزة 🏢</h1>
    <p style="text-align:center; color:#94a3b8; margin:0;">مع الأستاذ عمرو محمد</p>
    <hr style="border:0; height:1px; background:#334155; margin:20px 0;">

    <div class="grid">
        <div class="card">
            <h3>✨ إضافة عقار جديد</h3>
            <form id="estateForm">
                <div class="form-group"><label>عنوان العقار:</label><input type="text" id="title" placeholder="مثال: شقة في الدقي لقطة" required></div>
                <div class="form-group"><label>السعر (جنيه):</label><input type="text" id="price" placeholder="مثال: 3,200,000" required></div>
                <div class="form-group"><label>التفاصيل بالكامل:</label><textarea id="description" rows="5" placeholder="اكتب كل التفاصيل..." required></textarea></div>
                <div class="form-group"><label>الصور (حتى 5 صور):</label><input type="file" id="imageFiles" accept="image/*" multiple required></div>
                <button type="submit" class="send-btn">🚀 نشر العقار في موقع الزوار فوراً</button>
                <div class="status-msg" id="statusMsg">✅ تم رفع العقار وتحديث موقع العملاء!</div>
            </form>
        </div>

        <div class="card">
            <h3>📋 العقارات المعروضة بالسيستم</h3>
            <div id="currentEstates" style="max-height:500px; overflow-y:auto;">جاري التحميل...</div>
        </div>
    </div>
</div>

<script>
    function checkAdminLogin() {
        const input = document.getElementById('adminPasswordInput').value;
        
        // تشفير الباسورد المدخل ومقارنته بالقيمة المشفرة لـ "2233"
        // شفرة "2233" هي: 02522a2b2726fb0a03bb19f2d8d9524d
        const hashedInput = CryptoJS.MD5(input).toString();
        
        if(hashedInput === "02522a2b2726fb0a03bb19f2d8d9524d") {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            initFirebaseConnection();
        } else {
            alert("كلمة السر خاطئة!");
        }
    }

    let database;
    function initFirebaseConnection() {
        const firebaseConfig = { databaseURL: "https://cort-6368a-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        database = firebase.database();

        database.ref('properties').on('value', (snapshot) => {
            let html = '';
            snapshot.forEach((child) => {
                const data = child.val();
                html += `<div class="estate-box"><div><strong>${data.title}</strong><div style="color:var(--gold); font-size:13px;">${data.price} ج.م</div></div><button class="btn-delete" onclick="deleteProperty('${child.key}')">حذف 🗑️</button></div>`;
            });
            document.getElementById('currentEstates').innerHTML = html || 'لا توجد عقارات حالياً.';
        });
    }

    document.getElementById('estateForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const fileInput = document.getElementById('imageFiles');
        if(fileInput.files.length > 5) { alert("أقصى حد 5 صور!"); return; }

        const base64Images = [];
        for(let i=0; i < fileInput.files.length; i++) {
            const str = await convertFileToBase64(fileInput.files[i]);
            base64Images.push(str);
        }

        database.ref('properties').push({
            title: document.getElementById('title').value,
            price: document.getElementById('price').value,
            description: document.getElementById('description').value,
            images: base64Images,
            timestamp: Date.now()
        }).then(() => {
            document.getElementById('estateForm').reset();
            document.getElementById('statusMsg').style.display = 'block';
            setTimeout(() => { document.getElementById('statusMsg').style.display = 'none'; }, 4000);
        });
    });

    function convertFileToBase64(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
        });
    }

    function deleteProperty(key) {
        if(confirm("هل تريد حذف هذا العقار؟")) { database.ref('properties').child(key).remove(); }
    }
</script>
</body>
</html>
